<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MesaGo · Cocina / Barra local</title>
<style>
:root{--bg:#121212;--panel:#1D1D1D;--card:#252525;--text:#F7F3EA;--muted:#A9A196;--border:#36322D;--gold:#B07D10;--green:#2E7D32;--red:#B3261E;--blue:#1E5AA8}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}header{position:sticky;top:0;z-index:10;background:rgba(18,18,18,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:16px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;max-width:1200px;margin:0 auto}h1{font-size:22px}.sub{font-size:13px;color:var(--muted);margin-top:3px}.pill{background:#12351B;color:#B7F5C0;border:1px solid #245B32;padding:8px 12px;border-radius:999px;font-size:13px;font-weight:800;white-space:nowrap}main{max-width:1200px;margin:0 auto;padding:16px}.stats{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));gap:10px;margin-bottom:14px}.stat{background:linear-gradient(180deg,#29241D,#1D1D1D);border:1px solid var(--border);border-radius:16px;padding:13px}.stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:900}.stat .v{font-size:24px;font-weight:950;margin-top:4px;color:#FFD98A}.stat .s{font-size:12px;color:var(--muted);margin-top:2px}.top-products{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:13px;margin-bottom:14px}.top-products h2{font-size:15px;margin-bottom:9px}.top-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;padding:8px 0;border-top:1px solid rgba(255,255,255,.06);font-size:13px}.top-row:first-of-type{border-top:0}.top-row b{color:#fff}.top-row span{color:var(--muted)}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.toolbar button{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:10px;padding:10px 12px;font-weight:800;cursor:pointer}.toolbar button.active{background:var(--gold);border-color:var(--gold)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}.order{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.22)}.order.new{border-color:var(--gold);box-shadow:0 0 0 2px rgba(176,125,16,.25)}.order-head{padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.mesa{font-size:24px;font-weight:950}.meta{color:var(--muted);font-size:12px;margin-top:3px}.num{font-size:18px;font-weight:950;color:#FFD98A}.status{font-size:12px;font-weight:900;padding:5px 9px;border-radius:999px;margin-top:6px;text-align:center}.received{background:#332503;color:#FFD98A}.preparing{background:#102545;color:#A8C7FA}.served{background:#12351B;color:#B7F5C0}.cancelled{background:#3B1410;color:#FFB4AB}.bill_requested{background:#332503;color:#FFD98A}.bill-card{border-color:#FFD98A;box-shadow:0 0 0 2px rgba(255,217,138,.25)}.bill-note{padding:18px 14px;font-size:18px;font-weight:950;color:#FFD98A}.items{padding:10px 14px}.item{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06)}.item:last-child{border-bottom:0}.qty{font-weight:950;color:#FFD98A}.name{font-weight:800}.variant{font-size:12px;color:var(--muted);margin-top:2px}.price{font-size:13px;color:var(--muted);white-space:nowrap}.total{display:flex;justify-content:space-between;padding:12px 14px;border-top:1px solid var(--border);font-weight:950;font-size:18px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px;background:#1A1A1A;border-top:1px solid var(--border)}.actions button{border:0;border-radius:11px;padding:12px 10px;font-weight:950;cursor:pointer;color:#fff}.prep{background:var(--blue)}.done{background:var(--green)}.cancel{background:var(--red)}.ghost{background:#3A3631}.empty{border:1px dashed var(--border);border-radius:18px;padding:40px;text-align:center;color:var(--muted)}.small{font-size:12px;color:var(--muted);line-height:1.5;margin-top:10px}code{background:#2b2b2b;border-radius:5px;padding:1px 5px}@media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}}@media(max-width:640px){.top{align-items:flex-start}.grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.stat .v{font-size:20px}}
.account-section{padding:12px 14px;border-top:1px solid var(--border)}.account-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;font-weight:950;margin-bottom:7px}.bill-box{margin:0 14px 12px;border:1px solid rgba(255,217,138,.45);background:#2A2418;border-radius:14px;padding:12px}.bill-box .bill-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}.bill-box .bill-head b{color:#FFD98A;font-size:16px}.bill-box .copy{font-size:12px;color:var(--muted);line-height:1.4}.receipt-btn{border:0;background:#FFD98A;color:#15110A;border-radius:10px;padding:9px 10px;font-weight:950;cursor:pointer;white-space:nowrap}.muted-line{color:var(--muted);font-size:12px;padding:10px 14px}.round-pill{display:inline-block;background:#332503;color:#FFD98A;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:950;margin-top:6px}.actions.three{grid-template-columns:1fr 1fr 1fr}@media(max-width:640px){.actions.three{grid-template-columns:1fr}.bill-box .bill-head{display:block}.receipt-btn{width:100%;margin-top:10px}}
.demand-panel{background:linear-gradient(180deg,#332503,#241B0A);border:1px solid #5D420F;border-radius:18px;padding:14px;margin-bottom:14px}.demand-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.demand-head h2{font-size:17px;color:#FFD98A}.demand-copy{font-size:12px;color:var(--muted);line-height:1.45;margin-top:3px}.demand-state{font-size:12px;font-weight:950;border-radius:999px;padding:6px 10px;background:#3A3631;color:#D8D0C2;white-space:nowrap}.demand-state.on{background:#5B211C;color:#FFB4AB}.demand-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.demand-controls button,.demand-controls select{border:1px solid var(--border);background:#1D1D1D;color:var(--text);border-radius:11px;padding:10px 12px;font-weight:900}.demand-controls button{cursor:pointer}.demand-controls .activate{background:var(--gold);border-color:var(--gold);color:#fff}.demand-controls .off{background:#3A3631;color:#fff}.demand-controls input{width:92px;border:1px solid var(--border);background:#1D1D1D;color:#fff;border-radius:11px;padding:10px 12px;font-weight:900}
</style>
</head>
<body>
<header><div class="top"><div><h1>🍳 MesaGo · Cocina / Barra</h1><div class="sub">BORAZ Chiringo Club · demo local en tiempo real</div></div><div class="pill" id="conn">Online</div></div></header>
<main>

  <section class="demand-panel" id="demandPanel">
    <div class="demand-head">
      <div>
        <h2>🔥 Modo alta demanda</h2>
        <p class="demand-copy">Si se activa, el cliente verá el tiempo aproximado de espera antes de confirmar el pedido.</p>
      </div>
      <div class="demand-state" id="demandState">Normal</div>
    </div>
    <div class="demand-controls">
      <button type="button" onclick="quickDemand(15)">15 min</button>
      <button type="button" onclick="quickDemand(30)">30 min</button>
      <button type="button" onclick="quickDemand(45)">45 min</button>
      <input id="demandMinutes" type="number" min="1" max="240" value="30" aria-label="Minutos de espera">
      <button class="activate" type="button" onclick="saveDemand(true)">Activar</button>
      <button class="off" type="button" onclick="saveDemand(false)">Desactivar</button>
    </div>
  </section>
  <section class="stats" id="stats"></section>
  <section class="top-products" id="topProducts"></section>
  <div class="toolbar">
    <button class="active" data-filter="active" onclick="setFilter('active')">Activos</button>
    <button data-filter="all" onclick="setFilter('all')">Todos</button>
    <button data-filter="received" onclick="setFilter('received')">Recibidos</button>
    <button data-filter="preparing" onclick="setFilter('preparing')">Preparando</button>
    <button data-filter="served" onclick="setFilter('served')">Servidos</button>
  </div>
  <div id="orders" class="grid"></div>
  <p class="small">Esta versión no necesita Firebase. Solo deja abierto <code>node server.js</code> en el ordenador central.</p>
</main>
<script>let orders=[];let filter='active';let demand={active:false,waitMinutes:0};
const money=n=>Number(n||0).toFixed(2).replace('.',',')+' €';
const statusLabel={received:'Recibido',preparing:'Preparando',served:'Servido',cancelled:'Cancelado',bill_requested:'Cuenta solicitada'};
function esc(str){return String(str??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function timeAgo(ts){const m=Math.max(0,Math.floor((Date.now()-(ts||Date.now()))/60000));return m<1?'ahora':m===1?'hace 1 min':`hace ${m} min`}
function setFilter(f){filter=f;document.querySelectorAll('.toolbar button').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));render()}
function isBill(o){return o.type==='bill'||o.status==='bill_requested'}

function renderDemand(){const state=document.getElementById('demandState');const input=document.getElementById('demandMinutes');if(input&&demand.waitMinutes)input.value=demand.waitMinutes;if(state){state.textContent=demand.active?`Alta demanda · ${demand.waitMinutes} min`:'Normal';state.classList.toggle('on',!!demand.active);}}
async function saveDemand(active){const input=document.getElementById('demandMinutes');const waitMinutes=Number(input?.value||30)||30;const r=await fetch('/api/demand',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({active,waitMinutes})});const d=await r.json();demand=d.demand||demand;renderDemand()}
function quickDemand(minutes){const input=document.getElementById('demandMinutes');if(input)input.value=minutes;saveDemand(true)}
async function loadDemand(){const r=await fetch('/api/demand');const d=await r.json();demand=d.demand||demand;renderDemand()}
function calcStats(){const valid=orders.filter(o=>o.status!=='cancelled'&&!isBill(o));const served=orders.filter(o=>o.status==='served'&&!isBill(o));const revenue=valid.reduce((s,o)=>s+Number(o.total||0),0);const servedRevenue=served.reduce((s,o)=>s+Number(o.total||0),0);const products=new Map();for(const o of valid){for(const i of o.items||[]){const key=i.name+' · '+(i.variant||'');const prev=products.get(key)||{name:i.name,variant:i.variant||'',qty:0,total:0};prev.qty+=Number(i.qty||0);prev.total+=Number(i.qty||0)*Number(i.price||0);products.set(key,prev)}}return{valid,served,revenue,servedRevenue,avg:valid.length?revenue/valid.length:0,top:[...products.values()].sort((a,b)=>b.qty-a.qty||b.total-a.total).slice(0,5)}}
function renderStats(){const s=calcStats();document.getElementById('stats').innerHTML=`<div class="stat"><div class="l">Facturación</div><div class="v">${money(s.revenue)}</div><div class="s">Pedidos no cancelados</div></div><div class="stat"><div class="l">Cobrado/servido</div><div class="v">${money(s.servedRevenue)}</div><div class="s">Marcados como servidos</div></div><div class="stat"><div class="l">Pedidos</div><div class="v">${s.valid.length}</div><div class="s">${orders.filter(o=>o.status==='received').length} pendientes · ${s.served.length} servidos</div></div><div class="stat"><div class="l">Ticket medio</div><div class="v">${money(s.avg)}</div><div class="s">Promedio por pedido</div></div>`;document.getElementById('topProducts').innerHTML=`<h2>🔥 Productos más pedidos</h2>${s.top.length?s.top.map((p,i)=>`<div class="top-row"><b>${i+1}. ${esc(p.name)}<br><span>${esc(p.variant)}</span></b><span>${p.qty} uds</span><span>${money(p.total)}</span></div>`).join(''):'<div class="empty" style="padding:18px">Aún no hay productos pedidos.</div>'}`}
function activeRecords(){let list=[...orders].sort((a,b)=>(b.ts||0)-(a.ts||0));if(filter==='active')return list.filter(o=>!['served','cancelled'].includes(o.status));if(['received','preparing'].includes(filter))return list.filter(o=>!isBill(o)&&o.status===filter);if(filter==='all')return list;return list}
function groupServedByMesa(){const served=orders.filter(o=>o.status==='served'||(isBill(o)&&o.status==='served'));const map=new Map();for(const o of served){const mesa=String(o.mesa||'?');if(!map.has(mesa))map.set(mesa,{mesa,orders:[],bills:[],ts:0});const a=map.get(mesa);if(isBill(o))a.bills.push(o);else a.orders.push(o);a.ts=Math.max(a.ts,o.updatedAt||o.ts||0)}return[...map.values()].filter(a=>a.orders.length||a.bills.length).sort((a,b)=>(b.ts||0)-(a.ts||0))}
function aggregateItems(account){const sourceBill=account.bills.find(b=>b.account?.items?.length);if(sourceBill)return sourceBill.account.items;const grouped=new Map();for(const o of account.orders.filter(o=>o.status!=='cancelled')){for(const i of o.items||[]){const key=[i.name,i.variant,i.price].join('|');const prev=grouped.get(key)||{name:i.name,variant:i.variant||'',price:Number(i.price||0),qty:0};prev.qty+=Number(i.qty||0);grouped.set(key,prev)}}return[...grouped.values()]}
function accountTotal(account){const sourceBill=account.bills.find(b=>b.account);if(sourceBill)return Number(sourceBill.account.total||0);return account.orders.reduce((s,o)=>s+Number(o.total||0),0)}
function receiptText(account){const items=aggregateItems(account);const total=accountTotal(account);return ['BORAZ Chiringo Club · MesaGo','Copia local · Mesa '+account.mesa+(account.orders.length>1?' · '+account.orders.length+' rondas':''),new Date(account.ts||Date.now()).toLocaleString('es-ES'),'',...items.map(i=>`${i.qty}x ${i.name} (${i.variant||''}) — ${money(Number(i.qty||0)*Number(i.price||0))}`),'','Total: '+money(total),'Estado: cuenta entregada / servida'].join('\n')}
function printAccountReceipt(mesa){const account=groupServedByMesa().find(a=>a.mesa===String(mesa));if(!account)return;const items=aggregateItems(account);const total=accountTotal(account);const rows=items.map(i=>`<tr><td>${i.qty}× ${esc(i.name)}<br><small>${esc(i.variant||'')}</small></td><td style="text-align:right">${money(Number(i.qty||0)*Number(i.price||0))}</td></tr>`).join('');const w=window.open('','_blank','width=420,height=640');if(!w){alert('Permite ventanas emergentes para generar el recibo.');return}w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>Copia cuenta BORAZ</title><style>body{font-family:Arial,sans-serif;margin:24px;color:#111}.brand{font-size:22px;font-weight:900;letter-spacing:2px}.muted{color:#666;font-size:12px}table{width:100%;border-collapse:collapse;margin-top:18px}td{border-top:1px solid #ddd;padding:9px 0;font-size:13px}small{color:#666}.total{display:flex;justify-content:space-between;border-top:2px solid #111;margin-top:14px;padding-top:12px;font-size:20px;font-weight:900}@media print{button{display:none}}
</style></head><body><div class="brand">BORAZ</div><div class="muted">Copia local · Mesa ${esc(account.mesa)}${account.orders.length>1?' · '+account.orders.length+' rondas':''}</div><div class="muted">${new Date(account.ts||Date.now()).toLocaleString('es-ES')}</div><table>${rows}</table><div class="total"><span>Total</span><span>${money(total)}</span></div><p class="muted">Copia generada desde panel de cocina/barra.</p><button onclick="window.print()">Imprimir / guardar PDF</button><script>setTimeout(()=>window.print(),250)<\/script></body></html>`);w.document.close()}
function renderOrder(o){const bill=isBill(o);const itemsHtml=bill?`<div class="bill-note">🧾 Mesa ${esc(o.mesa||'?')} solicita la cuenta</div>${(o.items||[]).length?`<div class="account-section"><div class="account-title">Resumen de cuenta enviado por cliente</div><div class="items">${(o.items||[]).map(i=>`<div class="item"><div><span class="qty">${i.qty}×</span> <span class="name">${esc(i.name)}</span><div class="variant">${esc(i.variant||'')}</div></div><div class="price">${money(Number(i.qty||0)*Number(i.price||0))}</div></div>`).join('')}</div><div class="total"><span>Total cuenta</span><span>${money(o.total)}</span></div></div>`:''}`:`<div class="items">${(o.items||[]).map(i=>`<div class="item"><div><span class="qty">${i.qty}×</span> <span class="name">${esc(i.name)}</span><div class="variant">${esc(i.variant||'')}</div></div><div class="price">${money((i.qty||0)*(i.price||0))}</div></div>`).join('')}</div><div class="total"><span>Total ronda</span><span>${money(o.total)}</span></div>`;const actions=bill?`<div class="actions"><button class="done" onclick="settleBill('${o.id}', '${o.mesa||'?'}')">Cuenta entregada</button><button class="ghost" onclick="deleteOrder('${o.id}')">Borrar</button></div>`:`<div class="actions"><button class="prep" onclick="setStatus('${o.id}','preparing')">Preparando</button><button class="done" onclick="setStatus('${o.id}','served')">Servido</button><button class="cancel" onclick="setStatus('${o.id}','cancelled')">Cancelar</button><button class="ghost" onclick="deleteOrder('${o.id}')">Borrar</button></div>`;return `<article class="order ${o.status==='received'?'new':''} ${bill?'bill-card':''}"><div class="order-head"><div><div class="mesa">Mesa ${esc(o.mesa||'?')}</div><div class="meta">${timeAgo(o.ts)} · ${bill?'Solicitud de cuenta':'Pedido a cocina/barra'}</div></div><div><div class="num">${bill?'🧾':'#'+String(o.num||'000').padStart(3,'0')}</div><div class="status ${o.status||'received'}">${statusLabel[o.status]||'Recibido'}</div></div></div>${itemsHtml}${actions}</article>`}
function renderServedAccount(account){const items=aggregateItems(account);const bill=account.bills[0];const billHtml=bill?`<div class="bill-box"><div class="bill-head"><div><b>🧾 Cuenta entregada</b><div class="copy">Copia del recibo guardada para el local. ${items.length?items.length+' líneas · ':''}Total ${money(accountTotal(account))}</div></div><div style="display:grid;gap:8px"><button class="receipt-btn" onclick="printAccountReceipt('${account.mesa}')">Imprimir / PDF</button><button class="receipt-btn" style="background:#3A3631;color:#fff" onclick="deleteServedAccount('${account.mesa}')">Borrar mesa</button></div></div><pre style="white-space:pre-wrap;color:#D8D0C2;font-size:12px;line-height:1.35;margin-top:8px">${esc(receiptText(account))}</pre></div>`:'';return `<article class="order"><div class="order-head"><div><div class="mesa">Mesa ${esc(account.mesa)}</div><div class="meta">${timeAgo(account.ts)} · ${account.orders.length} ronda${account.orders.length===1?'':'s'} servida${account.orders.length===1?'':'s'}${bill?' · cuenta entregada':''}</div>${account.orders.length>1?`<span class="round-pill">${account.orders.length} rondas agrupadas</span>`:''}</div><div><div class="num">✅</div><div class="status served">Servido</div></div></div><div class="account-section"><div class="account-title">Servidos de la mesa</div><div class="items">${items.map(i=>`<div class="item"><div><span class="qty">${i.qty}×</span> <span class="name">${esc(i.name)}</span><div class="variant">${esc(i.variant||'')}</div></div><div class="price">${money(Number(i.qty||0)*Number(i.price||0))}</div></div>`).join('')}</div><div class="total"><span>Total mesa</span><span>${money(accountTotal(account))}</span></div></div>${billHtml}<div class="actions"><button class="ghost" onclick="deleteServedAccount('${account.mesa}')">Borrar mesa servida</button></div></article>`}
function render(){renderStats();const box=document.getElementById('orders');if(filter==='served'){const list=groupServedByMesa();box.innerHTML=list.length?list.map(renderServedAccount).join(''):'<div class="empty">No hay mesas servidas todavía.</div>';return}const list=activeRecords();box.innerHTML=list.length?list.map(renderOrder).join(''):'<div class="empty">No hay pedidos todavía. Haz uno desde el móvil.</div>'}
async function setStatus(id,status){await fetch(`/api/orders/${encodeURIComponent(id)}/status`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})})}
async function settleBill(billId,mesa){const sameMesa=orders.filter(o=>!isBill(o)&&o.mesa==mesa&&o.status!=='cancelled');await Promise.all(sameMesa.map(o=>setStatus(o.id,'served')));await setStatus(billId,'served');setFilter('served')}
async function deleteOrder(id){if(!confirm('¿Borrar este registro de la demo?'))return;await fetch(`/api/orders/${encodeURIComponent(id)}`,{method:'DELETE'})}
async function deleteServedAccount(mesa){const account=groupServedByMesa().find(a=>a.mesa===String(mesa));if(!account)return;const ids=[...account.orders,...account.bills].map(o=>o.id).filter(Boolean);if(!ids.length)return;if(!confirm(`¿Borrar la mesa ${mesa} de servidos? Se eliminarán ${ids.length} registro(s) de la demo.`))return;await Promise.all(ids.map(id=>fetch(`/api/orders/${encodeURIComponent(id)}`,{method:'DELETE'})));await load()}
async function load(){const r=await fetch('/api/orders');const d=await r.json();orders=d.orders||[];render()}
function connect(){const es=new EventSource('/api/events');es.addEventListener('orders',ev=>{const data=JSON.parse(ev.data);orders=data.orders||[];if(data.demand){demand=data.demand;renderDemand()}render()});es.onerror=()=>{document.getElementById('conn').textContent='Reconectando…';document.getElementById('conn').style.background='#2A1512';setTimeout(load,1000)}}
load();loadDemand();connect();setInterval(render,30000);</script>
</body>
</html>
