<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MesaGo · Cocina / Barra local</title>
<style>
:root{--bg:#121212;--panel:#1D1D1D;--card:#252525;--text:#F7F3EA;--muted:#A9A196;--border:#36322D;--gold:#B07D10;--green:#2E7D32;--red:#B3261E;--blue:#1E5AA8}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}header{position:sticky;top:0;z-index:10;background:rgba(18,18,18,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:16px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;max-width:1200px;margin:0 auto}h1{font-size:22px}.sub{font-size:13px;color:var(--muted);margin-top:3px}.pill{background:#12351B;color:#B7F5C0;border:1px solid #245B32;padding:8px 12px;border-radius:999px;font-size:13px;font-weight:800;white-space:nowrap}main{max-width:1200px;margin:0 auto;padding:16px}.stats{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));gap:10px;margin-bottom:14px}.stat{background:linear-gradient(180deg,#29241D,#1D1D1D);border:1px solid var(--border);border-radius:16px;padding:13px}.stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:900}.stat .v{font-size:24px;font-weight:950;margin-top:4px;color:#FFD98A}.stat .s{font-size:12px;color:var(--muted);margin-top:2px}.top-products{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:13px;margin-bottom:14px}.top-products h2{font-size:15px;margin-bottom:9px}.top-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;padding:8px 0;border-top:1px solid rgba(255,255,255,.06);font-size:13px}.top-row:first-of-type{border-top:0}.top-row b{color:#fff}.top-row span{color:var(--muted)}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.toolbar button{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:10px;padding:10px 12px;font-weight:800;cursor:pointer}.toolbar button.active{background:var(--gold);border-color:var(--gold)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}.order{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.22)}.order.new{border-color:var(--gold);box-shadow:0 0 0 2px rgba(176,125,16,.25)}.order-head{padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.mesa{font-size:24px;font-weight:950}.meta{color:var(--muted);font-size:12px;margin-top:3px}.num{font-size:18px;font-weight:950;color:#FFD98A}.status{font-size:12px;font-weight:900;padding:5px 9px;border-radius:999px;margin-top:6px;text-align:center}.received{background:#332503;color:#FFD98A}.preparing{background:#102545;color:#A8C7FA}.served{background:#12351B;color:#B7F5C0}.cancelled{background:#3B1410;color:#FFB4AB}.items{padding:10px 14px}.item{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06)}.item:last-child{border-bottom:0}.qty{font-weight:950;color:#FFD98A}.name{font-weight:800}.variant{font-size:12px;color:var(--muted);margin-top:2px}.price{font-size:13px;color:var(--muted);white-space:nowrap}.total{display:flex;justify-content:space-between;padding:12px 14px;border-top:1px solid var(--border);font-weight:950;font-size:18px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px;background:#1A1A1A;border-top:1px solid var(--border)}.actions button{border:0;border-radius:11px;padding:12px 10px;font-weight:950;cursor:pointer;color:#fff}.prep{background:var(--blue)}.done{background:var(--green)}.cancel{background:var(--red)}.ghost{background:#3A3631}.empty{border:1px dashed var(--border);border-radius:18px;padding:40px;text-align:center;color:var(--muted)}.small{font-size:12px;color:var(--muted);line-height:1.5;margin-top:10px}code{background:#2b2b2b;border-radius:5px;padding:1px 5px}@media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}}@media(max-width:640px){.top{align-items:flex-start}.grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.stat .v{font-size:20px}}
</style>
</head>
<body>
<header><div class="top"><div><h1>🍳 MesaGo · Cocina / Barra</h1><div class="sub">BORAZ Chiringo Club · demo local en tiempo real</div></div><div class="pill" id="conn">Online</div></div></header>
<main>
  <section class="stats" id="stats"></section>
  <section class="top-products" id="topProducts"></section>
  <div class="toolbar">
    <button class="active" data-filter="active" onclick="setFilter('active')">Activos</button>
    <button data-filter="all" onclick="setFilter('all')">Todos</button>
    <button data-filter="received" onclick="setFilter('received')">Recibidos</button>
    <button data-filter="preparing" onclick="setFilter('preparing')">Preparando</button>
    <button data-filter="served" onclick="setFilter('served')">Servidos</button>
  </div>
  <div id="orders" class="grid"></div>
  <p class="small">Esta versión no necesita Firebase. Solo deja abierto <code>node server.js</code> en el ordenador central.</p>
</main>
<script>
let orders=[];let filter='active';
const money=n=>Number(n||0).toFixed(2).replace('.',',')+' €';
const statusLabel={received:'Recibido',preparing:'Preparando',served:'Servido',cancelled:'Cancelado'};
function timeAgo(ts){const m=Math.max(0,Math.floor((Date.now()-(ts||Date.now()))/60000));return m<1?'ahora':m===1?'hace 1 min':`hace ${m} min`}
function setFilter(f){filter=f;document.querySelectorAll('.toolbar button').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));render()}
function visibleOrders(){let list=[...orders].sort((a,b)=>(b.ts||0)-(a.ts||0));if(filter==='active')return list.filter(o=>!['served','cancelled'].includes(o.status));if(filter==='all')return list;return list.filter(o=>o.status===filter)}
function calcStats(){const valid=orders.filter(o=>o.status!=='cancelled');const served=orders.filter(o=>o.status==='served');const revenue=valid.reduce((s,o)=>s+Number(o.total||0),0);const servedRevenue=served.reduce((s,o)=>s+Number(o.total||0),0);const products=new Map();for(const o of valid){for(const i of o.items||[]){const key=i.name+' · '+(i.variant||'');const prev=products.get(key)||{name:i.name,variant:i.variant||'',qty:0,total:0};prev.qty+=Number(i.qty||0);prev.total+=Number(i.qty||0)*Number(i.price||0);products.set(key,prev)}}return{valid,served,revenue,servedRevenue,avg:valid.length?revenue/valid.length:0,top:[...products.values()].sort((a,b)=>b.qty-a.qty||b.total-a.total).slice(0,5)}}
function renderStats(){const s=calcStats();document.getElementById('stats').innerHTML=`<div class="stat"><div class="l">Facturación</div><div class="v">${money(s.revenue)}</div><div class="s">Pedidos no cancelados</div></div><div class="stat"><div class="l">Cobrado/servido</div><div class="v">${money(s.servedRevenue)}</div><div class="s">Marcados como servidos</div></div><div class="stat"><div class="l">Pedidos</div><div class="v">${s.valid.length}</div><div class="s">${orders.filter(o=>o.status==='received').length} pendientes · ${s.served.length} servidos</div></div><div class="stat"><div class="l">Ticket medio</div><div class="v">${money(s.avg)}</div><div class="s">Promedio por pedido</div></div>`;document.getElementById('topProducts').innerHTML=`<h2>🔥 Productos más pedidos</h2>${s.top.length?s.top.map((p,i)=>`<div class="top-row"><b>${i+1}. ${p.name}<br><span>${p.variant}</span></b><span>${p.qty} uds</span><span>${money(p.total)}</span></div>`).join(''):'<div class="empty" style="padding:18px">Aún no hay productos pedidos.</div>'}`}
function render(){renderStats();const box=document.getElementById('orders');const list=visibleOrders();if(!list.length){box.innerHTML='<div class="empty">No hay pedidos todavía. Haz uno desde el móvil.</div>';return}box.innerHTML=list.map(o=>`<article class="order ${o.status==='received'?'new':''}"><div class="order-head"><div><div class="mesa">Mesa ${o.mesa||'?'}</div><div class="meta">${timeAgo(o.ts)} · Pago: ${(o.pago||'sin indicar').toUpperCase()}</div></div><div><div class="num">#${String(o.num||'000').padStart(3,'0')}</div><div class="status ${o.status||'received'}">${statusLabel[o.status]||'Recibido'}</div></div></div><div class="items">${(o.items||[]).map(i=>`<div class="item"><div><span class="qty">${i.qty}×</span> <span class="name">${i.name}</span><div class="variant">${i.variant||''}</div></div><div class="price">${money((i.qty||0)*(i.price||0))}</div></div>`).join('')}</div><div class="total"><span>Total</span><span>${money(o.total)}</span></div><div class="actions"><button class="prep" onclick="setStatus('${o.id}','preparing')">Preparando</button><button class="done" onclick="setStatus('${o.id}','served')">Servido</button><button class="cancel" onclick="setStatus('${o.id}','cancelled')">Cancelar</button><button class="ghost" onclick="deleteOrder('${o.id}')">Borrar</button></div></article>`).join('')}
async function setStatus(id,status){await fetch(`/api/orders/${encodeURIComponent(id)}/status`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})})}
async function deleteOrder(id){if(!confirm('¿Borrar este pedido de la demo?'))return;await fetch(`/api/orders/${encodeURIComponent(id)}`,{method:'DELETE'})}
async function load(){const r=await fetch('/api/orders');const d=await r.json();orders=d.orders||[];render()}
function connect(){const es=new EventSource('/api/events');es.addEventListener('orders',ev=>{orders=JSON.parse(ev.data).orders||[];render()});es.onerror=()=>{document.getElementById('conn').textContent='Reconectando…';document.getElementById('conn').style.background='#2A1512';setTimeout(load,1000)}}
load();connect();setInterval(render,30000);
</script>
</body>
</html>
