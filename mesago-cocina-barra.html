<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MesaGo · Cocina / Barra</title>
<style>
:root{
  --bg:#121212;--panel:#1D1D1D;--card:#252525;--text:#F7F3EA;--muted:#A9A196;
  --border:#36322D;--gold:#B07D10;--green:#2E7D32;--red:#B3261E;--blue:#1E5AA8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{position:sticky;top:0;z-index:10;background:rgba(18,18,18,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:16px}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px;max-width:1200px;margin:0 auto}
h1{font-size:22px;letter-spacing:.02em}.sub{font-size:13px;color:var(--muted);margin-top:3px}.pill{background:#241B0A;color:#FFD98A;border:1px solid #4A350C;padding:8px 12px;border-radius:999px;font-size:13px;font-weight:800;white-space:nowrap}
main{max-width:1200px;margin:0 auto;padding:16px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.toolbar button{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:10px;padding:10px 12px;font-weight:800;cursor:pointer}.toolbar button.active{background:var(--gold);border-color:var(--gold);color:#fff}.toolbar .danger{background:#2A1512;border-color:#5B211C;color:#FFB4AB}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}.order{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.22)}.order.new{border-color:var(--gold);box-shadow:0 0 0 2px rgba(176,125,16,.25)}
.order-head{padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.mesa{font-size:24px;font-weight:950}.meta{color:var(--muted);font-size:12px;margin-top:3px}.num{font-size:18px;font-weight:950;color:#FFD98A}.status{font-size:12px;font-weight:900;padding:5px 9px;border-radius:999px;margin-top:6px;text-align:center}.received{background:#332503;color:#FFD98A}.preparing{background:#102545;color:#A8C7FA}.served{background:#12351B;color:#B7F5C0}.cancelled{background:#3B1410;color:#FFB4AB}
.items{padding:10px 14px}.item{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06)}.item:last-child{border-bottom:0}.qty{font-weight:950;color:#FFD98A}.name{font-weight:800}.variant{font-size:12px;color:var(--muted);margin-top:2px}.price{font-size:13px;color:var(--muted);white-space:nowrap}.total{display:flex;justify-content:space-between;padding:12px 14px;border-top:1px solid var(--border);font-weight:950;font-size:18px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px;background:#1A1A1A;border-top:1px solid var(--border)}.actions button{border:0;border-radius:11px;padding:12px 10px;font-weight:950;cursor:pointer;color:#fff}.prep{background:var(--blue)}.done{background:var(--green)}.cancel{background:var(--red)}.ghost{background:#3A3631}.empty{border:1px dashed var(--border);border-radius:18px;padding:40px;text-align:center;color:var(--muted)}.setup{background:#2A1512;border:1px solid #5B211C;color:#FFB4AB;border-radius:14px;padding:12px 14px;margin-bottom:14px;font-size:14px;display:none}.setup.show{display:block}.small{font-size:12px;color:var(--muted);line-height:1.5;margin-top:10px}code{background:#2b2b2b;border-radius:5px;padding:1px 5px}.blink{animation:pulse 1.1s infinite}@keyframes pulse{50%{opacity:.45}}
@media(max-width:640px){.top{align-items:flex-start}.pill{font-size:12px}.grid{grid-template-columns:1fr}}
</style>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// PEGA AQUÍ LA MISMA CONFIGURACIÓN DE FIREBASE QUE EN EL MÓVIL
const firebaseConfig = {
  apiKey: "PEGA_AQUI",
  authDomain: "PEGA_AQUI",
  databaseURL: "PEGA_AQUI",
  projectId: "PEGA_AQUI",
  storageBucket: "PEGA_AQUI",
  messagingSenderId: "PEGA_AQUI",
  appId: "PEGA_AQUI"
};

const SALA = "boraz-demo";

try{
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window.MGKitchen = {
    listen(cb){ return onValue(ref(db, `salas/${SALA}/orders`), snap => cb(snap.val() || {})); },
    status(id,status){ return update(ref(db, `salas/${SALA}/orders/${id}`), {status, updatedAt:Date.now()}); },
    remove(id){ return remove(ref(db, `salas/${SALA}/orders/${id}`)); },
    ping(){ return set(ref(db, `salas/${SALA}/kitchenPing`), Date.now()); }
  };
  window.dispatchEvent(new Event("mg-kitchen-ready"));
}catch(e){
  console.error(e);
  window.dispatchEvent(new Event("mg-kitchen-error"));
}
</script>
</head>
<body>
<header>
  <div class="top">
    <div><h1>🍳 MesaGo · Cocina / Barra</h1><div class="sub">BORAZ Chiringo Club · pedidos en tiempo real</div></div>
    <div class="pill" id="conn">Conectando…</div>
  </div>
</header>
<main>
  <div class="setup" id="setup">⚠️ Falta configurar Firebase. Cuando pegues las claves reales en este archivo y en el móvil, los pedidos aparecerán aquí.</div>
  <div class="toolbar">
    <button class="active" data-filter="active" onclick="setFilter('active')">Activos</button>
    <button data-filter="all" onclick="setFilter('all')">Todos</button>
    <button data-filter="received" onclick="setFilter('received')">Recibidos</button>
    <button data-filter="preparing" onclick="setFilter('preparing')">Preparando</button>
    <button data-filter="served" onclick="setFilter('served')">Servidos</button>
  </div>
  <div id="orders" class="grid"></div>
  <p class="small">Sala compartida: <code>boraz-demo</code>. Debe coincidir con el archivo móvil.</p>
</main>
<script>
let orders = [];
let filter = 'active';
const money = n => Number(n||0).toFixed(2).replace('.',',') + ' €';
const statusLabel = {received:'Recibido',preparing:'Preparando',served:'Servido',cancelled:'Cancelado'};
const statusClass = s => ['received','preparing','served','cancelled'].includes(s) ? s : 'received';

function timeAgo(ts){
  if(!ts) return '';
  const m = Math.max(0, Math.floor((Date.now()-ts)/60000));
  if(m<1) return 'ahora';
  if(m===1) return 'hace 1 min';
  return `hace ${m} min`;
}
function setConn(text, ok){
  const el=document.getElementById('conn');
  el.textContent=text;
  el.style.background=ok?'#12351B':'#2A1512';
  el.style.color=ok?'#B7F5C0':'#FFB4AB';
  el.classList.toggle('blink', !ok && text.includes('Conectando'));
}
function setFilter(f){
  filter=f;
  document.querySelectorAll('.toolbar button').forEach(b=>b.classList.toggle('active', b.dataset.filter===f));
  render();
}
function visibleOrders(){
  let list=[...orders].sort((a,b)=>(b.ts||0)-(a.ts||0));
  if(filter==='active') return list.filter(o=>!['served','cancelled'].includes(o.status));
  if(filter==='all') return list;
  return list.filter(o=>o.status===filter);
}
function render(){
  const box=document.getElementById('orders');
  const list=visibleOrders();
  if(!list.length){ box.innerHTML='<div class="empty">No hay pedidos en esta vista todavía.</div>'; return; }
  box.innerHTML=list.map(o=>`
    <article class="order ${o.status==='received'?'new':''}">
      <div class="order-head">
        <div><div class="mesa">Mesa ${o.mesa||'?'}</div><div class="meta">${timeAgo(o.ts)} · Pago: ${(o.pago||'sin indicar').toUpperCase()}</div></div>
        <div><div class="num">#${String(o.num||'000').padStart(3,'0')}</div><div class="status ${statusClass(o.status)}">${statusLabel[o.status]||'Recibido'}</div></div>
      </div>
      <div class="items">
        ${(o.items||[]).map(i=>`
          <div class="item"><div><span class="qty">${i.qty}×</span> <span class="name">${i.name}</span><div class="variant">${i.variant||''}</div></div><div class="price">${money((i.qty||0)*(i.price||0))}</div></div>
        `).join('')}
      </div>
      <div class="total"><span>Total</span><span>${money(o.total)}</span></div>
      <div class="actions">
        <button class="prep" onclick="setStatus('${o.id}','preparing')">Preparando</button>
        <button class="done" onclick="setStatus('${o.id}','served')">Servido</button>
        <button class="cancel" onclick="setStatus('${o.id}','cancelled')">Cancelar</button>
        <button class="ghost" onclick="deleteOrder('${o.id}')">Borrar</button>
      </div>
    </article>
  `).join('');
}
async function setStatus(id,status){ try{ await window.MGKitchen.status(id,status); }catch(e){ alert('No se pudo actualizar. Revisa Firebase.'); } }
async function deleteOrder(id){ if(!confirm('¿Borrar este pedido de la demo?')) return; try{ await window.MGKitchen.remove(id); }catch(e){ alert('No se pudo borrar.'); } }
window.addEventListener('mg-kitchen-ready', async ()=>{
  try{ await window.MGKitchen.ping(); setConn('Online', true); }
  catch(e){ document.getElementById('setup').classList.add('show'); setConn('Sin Firebase', false); }
  window.MGKitchen.listen(data=>{ orders=Object.values(data||{}); render(); });
});
window.addEventListener('mg-kitchen-error', ()=>{ document.getElementById('setup').classList.add('show'); setConn('Sin Firebase', false); render(); });
setConn('Conectando…', false); render();
</script>
</body>
</html>
